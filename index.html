<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="./style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Tangerine:wght@700&display=swap"
        rel="stylesheet">

</head>

<body>
    <!-- -------- Landing page ------- -->

    <div class="main-ctr">
        <!-- header -->
        <div class="header">
            <div class="logo">
                <img src="./images/netflix logo.png" alt="netflix logo">
            </div>
            <div class="login">
                <a href="#">Sign In</a>
            </div>
        </div>

        <!-- main content -->

        <div class="content">

            <div class="heading">
                <h1>Unlimited movies,TV shows, and more</h1>
                <p>Watch anywhere. Cancle anytime.</p>
            </div>
            <div class="startsCont">
                <h3>Ready to watch?Enter your email to create or restart your membership.</h3>
            </div>
            <div class="email-ctr">
                <input class="input" type="email" placeholder="Email address" >
                <button>Git Started  ></button>
            </div>

        </div>

    </div>

</body>

</html>
